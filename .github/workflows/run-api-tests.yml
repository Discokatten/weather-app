name: Run API tests

# Trigger which git action (push, pull_request)
# in which branch(es) should start the jobs...
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  # add branch-protection-rules in github for main (require pull-request)
  # then add another branch and try to make a pull-request in github
  # to merge your branch into main:
  # - the following will happens: these tests will run
  # - and a report of success/failure will be shown to the person
  #   approving the pull request

# jobs to run
jobs:
  # build, the name of the job, a server to create and auto configure
  build:
    runs-on: ubuntu-latest

    strategy:
      # only testing on Node 24
      matrix:
        node-version: [24.x]

    steps:
      # action from github marketplace, actions
      # checkout this repo on the server
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        # action from github marketplace, actions
        # install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
        # npm ci ≈ read-only from package.json version
        # of npm install -> installs all npm modules
        # mentioned in package.json, preferably during CI
      - run: npm ci
      - run: npm run seed
        # start the web server in the background
        # nohup prevents the process from stopping if the terminal closes
      - run: nohup npm run server &
        # poll until the server responds before continuing
        # retries every 2 seconds up to 15 times (30 seconds max)
        # replace localhost:3000 with your actual port/endpoint
      - name: Wait for server to be ready
        run: |
          for i in {1..15}; do
            curl -s http://localhost:3000 && break
            echo "Waiting... ($i)"
            sleep 2
          done

      - run: npm audit --omit=dev --audit-level=high

      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
      - name: Run API tests
        run: |
          postman collection run "20428110-67f8120e-b505-47f7-a83f-d6daaf2c7b1d"
